id: example-path-pass
name: Passing path demo
family: close_approach
parameters:
  description: A simple path that remains outside the central volume.
  uncertainty:
    position_sigma: {x: 0.02, y: 0.2, z: 0.05}
    timing_sigma: 0.15
    attitude_sigma_deg: {x: 0.4, y: 0.4, z: 0.2}
    samples: 100
    seed: 11
planned_path:
  - t: 0
    position: {x: 10.0, y: 0.0, z: 0.0}
    attitude_deg: {x: 0.0, y: 0.0, z: 0.0}
  - t: 10
    position: {x: 7.5, y: 0.0, z: 0.0}
    attitude_deg: {x: 0.0, y: 0.0, z: 0.0}
  - t: 20
    position: {x: 5.0, y: 0.0, z: 0.0}
    attitude_deg: {x: 0.0, y: 0.0, z: 0.0}
  - t: 30
    position: {x: 3.0, y: 0.0, z: 0.0}
    attitude_deg: {x: 0.0, y: 0.0, z: 0.0}
